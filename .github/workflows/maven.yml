name : Build spring Boot
on:
    push:
        branches: [main]
jobs:
  build:
     run-on: ubuntu-latest
     steps:
     - uses: actions/chechout@v4

     -name : java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build 
      run: mvn clean pakage -DskipTests


