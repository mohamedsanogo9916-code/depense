# ─────────────────────────────────────────────────────────────────
# Workflow CI : Build & Test pour projet Spring Boot (Maven)
# Se déclenche à chaque push ou pull request sur la branche main
# ─────────────────────────────────────────────────────────────────

name: Build Spring Boot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : récupérer le code du dépôt
      - name: Checkout du code
        uses: actions/checkout@v4

      # Étape 2 : installer Java 17
      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Étape 3 : compiler le projet et exécuter les tests
      - name: Build avec Maven
        run: mvn clean package

      # Étape 4 : sauvegarder le JAR généré comme artefact téléchargeable
      - name: Publier le JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 5